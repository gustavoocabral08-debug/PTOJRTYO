<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Veículos - Concessionária</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .cinzel-text { font-family: 'Cinzel', serif; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; animation: slideIn 0.3s ease; z-index: 1000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 12px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .dark-mode { background-color: #0f172a !important; color: #e2e8f0 !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; }
        .dark-mode .modal-content { background-color: #1e293b !important; color: #e2e8f0 !important; }
        .dark-mode input, .dark-mode select, .dark-mode textarea { background-color: #0f172a !important; border-color: #334155 !important; color: #e2e8f0 !important; }
        button { cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); }
        .vehicle-card { transition: 0.3s; background: white; border-radius: 12px; overflow: hidden; }
        .dark-mode .vehicle-card { background: #1e293b !important; }
        .vehicle-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .vehicle-image { width: 100%; height: 200px; object-fit: cover; }
        .gallery-image { width: 100%; height: 400px; object-fit: cover; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; cursor: pointer; border-radius: 8px; border: 2px solid transparent; }
        .thumbnail.active { border-color: #3b82f6; }
        .brand-btn { transition: all 0.2s; }
        .brand-btn:hover { transform: scale(1.05); }
        .preview-image { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin: 5px; }
        .gallery-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .gallery-item { position: relative; }
        .remove-image-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
        .hero-section { position: relative; background-image: url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=1600&h=600&fit=crop'); background-size: cover; background-position: center; }
        .hero-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 100%); }
        .add-image-btn { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 8px; display: inline-block; cursor: pointer; margin-top: 10px; }
        .add-image-btn:hover { background: #2563eb; }
        .loading { text-align: center; padding: 50px; font-size: 18px; }
    </style>
</head>
<body class="bg-gray-100">
<div id="app"><div class="loading">🔄 Carregando dados dos veículos...</div></div>

<script>
    // ==================== CONFIGURAÇÕES ====================
    const ADMIN_EMAIL = 'admin@jmveiculos.com';
    const ADMIN_PASSWORD = '245464Jm<becs$';
    const MARCAS = ["Chevrolet", "Volkswagen", "Peugeot", "Toyota", "Fiat", "Renault", "Ford", "Honda", "Hyundai", "Jeep", "Nissan", "Citroen"];
    
    // ==================== DADOS INICIAIS (FALLBACK) ====================
    const DADOS_PADRAO = [
        { id: 1, nome: "Gol", marca: "Volkswagen", ano: 2014, preco: 35000, km: 120000, combustivel: "Flex", cambio: "Manual", cor: "Prata", status: "disponível", imagens: ["https://i.imgur.com/hcz1hxh.jpg"], descricao: "Gol 1.6 completo, econômico." }
    ];
    
    // ==================== ESTADO ====================
    let vehicles = [];
    let currentPage = 'home';
    let selectedVehicle = null;
    let isAdmin = false;
    let showLoginModal = false;
    let showVehicleModal = false;
    let editingVehicle = null;
    let toastMessage = null;
    let selectedMarca = 'todas';
    let filterStatus = 'todos';
    let isDarkMode = false;
    let currentImageIndex = 0;
    let isLoading = true;
    
    // ==================== FUNÇÕES ====================
    function showToast(msg, isError = false) { 
        toastMessage = { text: msg, isError }; 
        render(); 
        setTimeout(() => { toastMessage = null; render(); }, 3000); 
    }
    
    function formatPrice(p) { return 'R$ ' + p.toLocaleString('pt-BR'); }
    function getStatusColor(s) { return s === 'disponível' ? 'bg-green-500' : s === 'reservado' ? 'bg-yellow-500' : 'bg-red-500'; }
    
    // Carregar dados do arquivo JSON
    async function carregarVeiculos() {
        try {
            isLoading = true;
            render();
            const response = await fetch('./dados/veiculos.json');
            if (response.ok) {
                vehicles = await response.json();
                console.log('✅ Veículos carregados do arquivo:', vehicles.length);
            } else {
                console.warn('Arquivo não encontrado, usando dados padrão');
                vehicles = DADOS_PADRAO;
            }
        } catch (error) {
            console.error('Erro ao carregar:', error);
            vehicles = DADOS_PADRAO;
            showToast('⚠️ Usando dados locais', true);
        } finally {
            isLoading = false;
            render();
        }
    }
    
    function handleLogin(email, pass) {
        if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
            isAdmin = true;
            showLoginModal = false;
            showToast('✅ Login realizado!');
            render();
        } else { showToast('❌ Credenciais inválidas!', true); }
    }
    
    function handleLogout() { isAdmin = false; showToast('Logout realizado'); render(); }
    function handleDeleteVehicle(id) { if (confirm('Excluir este veículo?')) { vehicles = vehicles.filter(v => v.id !== id); showToast('Veículo excluído!'); render(); } }
    function handleContact(vehicle) { showToast(`Interesse em ${vehicle.nome}! Entraremos em contato.`); }
    function toggleTheme() { isDarkMode = !isDarkMode; render(); }
    
    // ==================== FUNÇÕES GLOBAIS ====================
    window.selectMarca = (m) => { selectedMarca = m; render(); };
    window.updateFilter = (s) => { filterStatus = s; render(); };
    window.changePage = (page) => { currentPage = page; selectedVehicle = null; render(); };
    window.viewDetail = (id) => { selectedVehicle = vehicles.find(v => v.id === id); currentImageIndex = 0; currentPage = 'detail'; render(); };
    window.setImageIndex = (i) => { currentImageIndex = i; render(); };
    window.showLogin = () => { showLoginModal = true; render(); };
    window.closeLogin = () => { showLoginModal = false; render(); };
    window.submitLogin = (e) => { e.preventDefault(); handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); };
    window.openVehicleModal = () => { editingVehicle = null; showVehicleModal = true; render(); };
    window.closeVehicleModal = () => { showVehicleModal = false; editingVehicle = null; render(); };
    window.editVehicle = (id) => { editingVehicle = JSON.parse(JSON.stringify(vehicles.find(v => v.id === id))); showVehicleModal = true; render(); };
    window.updateStatus = (id, status) => { const v = vehicles.find(v => v.id === id); if (v) { v.status = status; showToast('Status atualizado!'); render(); } };
    window.deleteVehicle = handleDeleteVehicle;
    window.handleContact = handleContact;
    window.toggleTheme = toggleTheme;
    
    // ==================== SUBMIT VEÍCULO ====================
    window.submitVehicle = async (e) => {
        e.preventDefault();
        
        const nome = document.getElementById('nome').value;
        const marca = document.getElementById('marca').value;
        const ano = parseInt(document.getElementById('ano').value);
        const preco = parseInt(document.getElementById('preco').value);
        const km = parseInt(document.getElementById('km').value);
        const cor = document.getElementById('cor').value;
        const combustivel = document.getElementById('combustivel').value;
        const cambio = document.getElementById('cambio').value;
        const descricao = document.getElementById('descricao').value;
        
        const previewDiv = document.getElementById('imagePreview');
        const imagens = [];
        if (previewDiv) {
            const imgElements = previewDiv.querySelectorAll('.gallery-item img');
            imgElements.forEach(img => { if (img.src) imagens.push(img.src); });
        }
        
        if (editingVehicle) {
            const index = vehicles.findIndex(v => v.id === editingVehicle.id);
            if (index !== -1) {
                vehicles[index] = { ...editingVehicle, nome, marca, ano, preco, km, cor, combustivel, cambio, descricao, imagens: imagens.length ? imagens : editingVehicle.imagens };
                showToast('✅ Veículo atualizado!');
            }
        } else {
            const newVehicle = { id: Date.now(), nome, marca, ano, preco, km, cor, combustivel, cambio, descricao, status: 'disponível', imagens: imagens.length ? imagens : ['https://placehold.co/800x450?text=Sem+Imagem'] };
            vehicles.push(newVehicle);
            showToast('✅ Veículo adicionado!');
        }
        showVehicleModal = false;
        editingVehicle = null;
        render();
    };
    
    // ==================== RENDERIZAÇÃO ====================
    function render() {
        const app = document.getElementById('app');
        if (!app) return;
        
        if (isDarkMode) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
        
        if (isLoading) {
            app.innerHTML = `<div class="loading">🔄 Carregando dados dos veículos...<br><br><div class="text-sm text-gray-500">Aguarde um momento</div></div>`;
            return;
        }
        
        let html = `
            <div class="min-h-screen flex flex-col">
                <nav class="bg-white shadow-md sticky top-0 z-50">
                    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                        <div class="text-2xl font-bold cursor-pointer" onclick="window.changePage('home')">
                            <span style="color:#3b82f6;">JM</span> <span style="color:#6b7280;">VEÍCULOS</span>
                        </div>
                        <div class="flex gap-4 items-center">
                            <button onclick="window.changePage('home')" class="px-3 py-2 rounded">🏠 Home</button>
                            <button onclick="window.changePage('vehicles')" class="px-3 py-2 rounded">🚗 Veículos</button>
                            ${isAdmin ? `<button onclick="window.changePage('admin')" class="px-3 py-2 rounded bg-blue-500 text-white">👑 Admin</button><button onclick="handleLogout()" class="px-3 py-2 rounded bg-red-500 text-white">Sair</button>` : `<button onclick="window.showLogin()" class="px-3 py-2 rounded bg-blue-500 text-white">Admin</button>`}
                            <button onclick="window.toggleTheme()" class="px-3 py-2 rounded">${isDarkMode ? '☀️' : '🌙'}</button>
                        </div>
                    </div>
                </nav>
                <div class="flex-grow">`;
        
        if (currentPage === 'home') {
            const destaques = vehicles.filter(v => v.status === 'disponível').slice(0, 3);
            html += `
                <div class="hero-section"><div class="relative z-10 container mx-auto px-4 py-24 text-center"><h1 class="cinzel-text text-5xl font-bold text-white mb-6">Potência, estilo e confiança<br>na sua garagem</h1><p class="text-xl text-gray-200 mb-8">As melhores ofertas com garantia de procedência</p><button onclick="window.changePage('vehicles')" class="bg-blue-600 text-white px-8 py-3 rounded-lg">Ver Ofertas</button></div></div>
                <div class="container mx-auto px-4 py-16"><h2 class="text-3xl font-bold text-center mb-12">⭐ Veículos em Destaque</h2><div class="grid md:grid-cols-3 gap-6">${destaques.map(v => `<div class="vehicle-card"><img src="${v.imagens[0]}" class="vehicle-image" onerror="this.src='https://placehold.co/500x300?text=Sem+Imagem'"><div class="p-4"><h3 class="text-xl font-bold">${v.nome}</h3><p>${v.marca} - ${v.ano}</p><p class="text-blue-600 text-2xl font-bold">${formatPrice(v.preco)}</p><button onclick="window.viewDetail(${v.id})" class="w-full mt-3 bg-blue-500 text-white py-2 rounded">Ver Detalhes</button></div></div>`).join('')}</div></div>
                <div class="bg-gray-100 dark:bg-gray-800 py-16"><div class="container mx-auto px-4 text-center"><h2 class="text-3xl font-bold mb-4">🔑 Pronto para começar?</h2><p class="text-lg mb-4">Com a JM Veículos, você está a um passo do carro próprio.</p><button onclick="window.changePage('vehicles')" class="bg-green-600 text-white px-6 py-2 rounded-lg">Quero meu carro</button></div></div>`;
        }
        else if (currentPage === 'vehicles') {
            let filtered = vehicles.filter(v => (selectedMarca === 'todas' || v.marca === selectedMarca) && (filterStatus === 'todos' || v.status === filterStatus));
            html += `<div class="container mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-6">🚗 Catálogo de Veículos</h1>
            <div class="mb-4"><label class="font-semibold">Filtrar por Marca:</label><div class="flex flex-wrap gap-2 mt-2">${MARCAS.map(m => `<button onclick="window.selectMarca('${m}')" class="brand-btn px-3 py-1 rounded ${selectedMarca === m ? 'bg-blue-500 text-white' : 'bg-gray-200'}">${m}</button>`).join('')}<button onclick="window.selectMarca('todas')" class="brand-btn px-3 py-1 rounded ${selectedMarca === 'todas' ? 'bg-blue-500 text-white' : 'bg-gray-200'}">Todas</button></div></div>
            <div class="mb-4"><label class="font-semibold">Filtrar por Status:</label><div class="flex flex-wrap gap-2 mt-2"><button onclick="window.updateFilter('todos')" class="px-3 py-1 rounded ${filterStatus === 'todos' ? 'bg-blue-500 text-white' : 'bg-gray-200'}">Todos</button><button onclick="window.updateFilter('disponível')" class="px-3 py-1 rounded ${filterStatus === 'disponível' ? 'bg-green-500 text-white' : 'bg-gray-200'}">Disponíveis</button><button onclick="window.updateFilter('reservado')" class="px-3 py-1 rounded ${filterStatus === 'reservado' ? 'bg-yellow-500 text-white' : 'bg-gray-200'}">Reservados</button><button onclick="window.updateFilter('vendido')" class="px-3 py-1 rounded ${filterStatus === 'vendido' ? 'bg-red-500 text-white' : 'bg-gray-200'}">Vendidos</button></div></div>
            <div class="grid md:grid-cols-3 gap-6">${filtered.map(v => `<div class="vehicle-card"><img src="${v.imagens[0]}" class="vehicle-image"><div class="p-4"><div class="flex justify-between"><h2 class="text-xl font-bold">${v.nome}</h2><span class="px-2 py-1 rounded text-xs text-white ${getStatusColor(v.status)}">${v.status}</span></div><p>${v.marca} • ${v.ano} • ${v.km.toLocaleString()} km</p><p class="text-blue-600 text-2xl font-bold">${formatPrice(v.preco)}</p><button onclick="window.viewDetail(${v.id})" class="w-full mt-2 bg-blue-500 text-white py-2 rounded">Ver Detalhes</button></div></div>`).join('')}</div></div>`;
        }
        else if (currentPage === 'detail' && selectedVehicle) {
            html += `<div class="container mx-auto px-4 py-8"><button onclick="window.changePage('vehicles')" class="text-blue-500 mb-4">← Voltar</button><div class="bg-white rounded-lg shadow-lg p-6"><img src="${selectedVehicle.imagens[currentImageIndex]}" class="gallery-image w-full rounded-lg"><div class="flex gap-2 mt-4 overflow-x-auto">${selectedVehicle.imagens.map((img, i) => `<img src="${img}" class="thumbnail ${currentImageIndex === i ? 'active' : ''}" onclick="window.setImageIndex(${i})">`).join('')}</div><h1 class="text-3xl font-bold mt-4">${selectedVehicle.nome}</h1><p class="text-blue-600 text-4xl font-bold mt-2">${formatPrice(selectedVehicle.preco)}</p><div class="grid md:grid-cols-2 gap-4 mt-6"><div><strong>Marca:</strong> ${selectedVehicle.marca}<br><strong>Ano:</strong> ${selectedVehicle.ano}<br><strong>KM:</strong> ${selectedVehicle.km.toLocaleString()} km</div><div><strong>Descrição:</strong><br>${selectedVehicle.descricao}</div></div><button onclick="window.handleContact(${JSON.stringify(selectedVehicle).replace(/"/g, '&quot;')})" class="w-full mt-6 bg-green-500 text-white py-3 rounded-lg text-lg">💰 Tenho Interesse</button></div></div>`;
        }
        else if (currentPage === 'admin' && isAdmin) {
            html += `<div class="container mx-auto px-4 py-8"><div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">👑 Painel Administrativo</h1><button onclick="window.openVehicleModal()" class="bg-green-500 text-white px-4 py-2 rounded">+ Novo Veículo</button></div><div class="bg-white rounded-lg shadow overflow-x-auto"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3">ID</th><th>Imagem</th><th>Veículo</th><th>Preço</th><th>Status</th><th>Fotos</th><th>Ações</th></tr></thead><tbody>${vehicles.map(v => `<tr class="border-t"><td class="p-3">${v.id}</td><td><img src="${v.imagens[0]}" class="w-12 h-12 object-cover rounded"></td><td><b>${v.nome}</b><br><small>${v.marca} ${v.ano}</small></td><td>${formatPrice(v.preco)}</td><td><select onchange="window.updateStatus(${v.id}, this.value)" class="border rounded p-1"><option ${v.status === 'disponível' ? 'selected' : ''}>disponível</option><option ${v.status === 'reservado' ? 'selected' : ''}>reservado</option><option ${v.status === 'vendido' ? 'selected' : ''}>vendido</option></select></td><td>📸 ${v.imagens.length}</td><td><button onclick="window.editVehicle(${v.id})" class="text-blue-600 mr-2">Editar</button><button onclick="window.deleteVehicle(${v.id})" class="text-red-600">Excluir</button></td></tr>`).join('')}</tbody></table></div></div>`;
        }
        
        html += `</div><footer class="bg-gray-800 text-white text-center py-4 mt-8">© 2024 JM Veículos - Potência, estilo e confiança</footer></div>`;
        
        if (showLoginModal) {
            html += `<div class="modal-overlay"><div class="modal-content"><h2 class="text-2xl font-bold mb-4">Login Admin</h2><form onsubmit="window.submitLogin(event)"><input type="email" id="loginEmail" placeholder="E-mail" class="w-full p-2 border rounded mb-2" required><input type="password" id="loginPass" placeholder="Senha" class="w-full p-2 border rounded mb-2" required><button type="submit" class="w-full bg-blue-500 text-white py-2 rounded">Entrar</button><button type="button" onclick="window.closeLogin()" class="w-full mt-2 bg-gray-500 text-white py-2 rounded">Cancelar</button></form></div></div>`;
        }
        
        if (showVehicleModal) {
            const v = editingVehicle || { nome: '', marca: MARCAS[0], ano: 2024, preco: 0, km: 0, combustivel: 'Flex', cambio: 'Manual', cor: '', descricao: '', imagens: [] };
            html += `<div class="modal-overlay"><div class="modal-content"><h2 class="text-2xl font-bold mb-4">${editingVehicle ? 'Editar Veículo' : 'Novo Veículo'}</h2><form id="vehicleForm"><input type="text" id="nome" placeholder="Nome" value="${v.nome}" class="w-full p-2 border rounded mb-2" required><select id="marca" class="w-full p-2 border rounded mb-2">${MARCAS.map(m => `<option ${v.marca === m ? 'selected' : ''}>${m}</option>`).join('')}</select><div class="grid grid-cols-2 gap-2 mb-2"><input type="number" id="ano" placeholder="Ano" value="${v.ano}" class="p-2 border rounded" required><input type="number" id="preco" placeholder="Preço" value="${v.preco}" class="p-2 border rounded" required><input type="number" id="km" placeholder="KM" value="${v.km}" class="p-2 border rounded" required><input type="text" id="cor" placeholder="Cor" value="${v.cor}" class="p-2 border rounded" required></div><select id="combustivel" class="w-full p-2 border rounded mb-2"><option ${v.combustivel === 'Flex' ? 'selected' : ''}>Flex</option><option ${v.combustivel === 'Gasolina' ? 'selected' : ''}>Gasolina</option><option ${v.combustivel === 'Diesel' ? 'selected' : ''}>Diesel</option></select><select id="cambio" class="w-full p-2 border rounded mb-2"><option ${v.cambio === 'Manual' ? 'selected' : ''}>Manual</option><option ${v.cambio === 'Automático' ? 'selected' : ''}>Automático</option></select><textarea id="descricao" placeholder="Descrição" rows="3" class="w-full p-2 border rounded mb-2">${v.descricao}</textarea><div><label class="block font-semibold mb-2">📸 Fotos do Veículo</label><div id="imagePreview" class="gallery-preview">${v.imagens.map(img => `<div class="gallery-item"><img src="${img}" class="preview-image"><div class="remove-image-btn" onclick="this.parentElement.remove()">×</div></div>`).join('')}</div><input type="file" id="vehicleImages" accept="image/*" multiple style="display:none"><button type="button" onclick="document.getElementById('vehicleImages').click()" class="add-image-btn">+ Selecionar Fotos</button></div><div class="flex gap-2 mt-4"><button type="submit" class="flex-1 bg-blue-500 text-white py-2 rounded">Salvar</button><button type="button" onclick="window.closeVehicleModal()" class="flex-1 bg-gray-500 text-white py-2 rounded">Cancelar</button></div></form></div></div>`;
        }
        
        if (toastMessage) html += `<div class="toast" style="background:${toastMessage.isError ? '#ef4444' : '#10b981'}">${toastMessage.text}</div>`;
        app.innerHTML = html;
        
        if (showVehicleModal) {
            const uploadInput = document.getElementById('vehicleImages');
            if (uploadInput) {
                uploadInput.onchange = function(e) {
                    Array.from(e.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = ev => {
                            const previewDiv = document.getElementById('imagePreview');
                            const div = document.createElement('div');
                            div.className = 'gallery-item';
                            div.innerHTML = `<img src="${ev.target.result}" class="preview-image"><div class="remove-image-btn" onclick="this.parentElement.remove()">×</div>`;
                            previewDiv.appendChild(div);
                        };
                        reader.readAsDataURL(file);
                    });
                };
            }
        }
    }
    
    // Inicializar
    carregarVeiculos();
</script>
</body>
</html>
